<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026년 6월 스케쥴러 — League of Legends</title>
<style>
/* ══════════════════════════════════════════════════════
   Base & LoL Theme
   Black  (네이버 개발자) : 저장·로직 담당 색상
   White  (카카오 기획자) : 기획·흐름 담당 색상
   Yellow (대학 교수)     : 구조·교육 담당 색상
══════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

:root {
  --gold:      #C8A95A;
  --gold-lt:   #E8D48A;
  --gold-dk:   #8B6914;
  --dark:      #010A13;
  --dark2:     #0A1428;
  --dark3:     #091428;
  --blue:      #0BC4E3;
  --blue-dk:   #0A5F75;
  --red:       #C62B2B;
  --panel:     rgba(1,10,19,0.92);
  --border:    rgba(200,169,90,0.5);

  /* User colors */
  --col-black:  #1a1a2e;
  --col-black-t:#3a3a6e;
  --col-white:  #e8e8f0;
  --col-white-t:#a0a0c0;
  --col-yellow: #f0c040;
  --col-yellow-t:#c09010;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  background: var(--dark);
  color: #ccc;
  overflow-x: hidden;
}

/* ── Background ── */
#bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(11,196,227,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(198,43,43,0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(200,169,90,0.06) 0%, transparent 50%),
    url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Lux_0.jpg') center/cover no-repeat;
  filter: brightness(0.22) saturate(1.4);
}
#bg::after {
  content: '';
  position: absolute; inset: 0;
  background:
    linear-gradient(to bottom, rgba(1,10,19,0.4) 0%, transparent 40%, rgba(1,10,19,0.8) 100%),
    repeating-linear-gradient(0deg, rgba(200,169,90,0.015) 0px, transparent 2px, transparent 40px);
}

/* ── Layout ── */
#app {
  position: relative; z-index: 1;
  max-width: 1280px; margin: 0 auto;
  padding: 20px 16px 60px;
}

/* ── Header ── */
header {
  text-align: center;
  padding: 28px 0 22px;
  position: relative;
}
header::before, header::after {
  content: '';
  display: block;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--gold-lt), var(--gold), transparent);
  margin: 10px auto;
  width: 80%;
}
.header-rune {
  font-size: 13px;
  letter-spacing: 4px;
  color: var(--gold-dk);
  text-transform: uppercase;
  margin-bottom: 6px;
}
header h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(22px, 4vw, 42px);
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold-dk), var(--gold-lt), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 3px;
  line-height: 1.1;
}
header h1 small {
  display: block;
  font-size: 0.45em;
  letter-spacing: 8px;
  opacity: 0.8;
  margin-top: 4px;
}

/* ── Legend bar ── */
#legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin: 14px 0;
}
.legend-item {
  display: flex; align-items: center; gap: 8px;
  background: rgba(200,169,90,0.06);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  color: var(--gold-lt);
}
.legend-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  flex-shrink: 0;
}

/* ── Panel base ── */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: 0 0 30px rgba(200,169,90,0.08), inset 0 0 40px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
}
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* ── Month view ── */
#month-view { padding: 20px; }

.cal-nav {
  display: flex; align-items: center; justify-content: center;
  gap: 20px; margin-bottom: 18px;
}
.cal-nav h2 {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  color: var(--gold-lt);
  letter-spacing: 2px;
  min-width: 220px;
  text-align: center;
}
.nav-btn {
  background: rgba(200,169,90,0.1);
  border: 1px solid var(--border);
  color: var(--gold);
  width: 36px; height: 36px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.nav-btn:hover {
  background: rgba(200,169,90,0.25);
  box-shadow: 0 0 10px rgba(200,169,90,0.3);
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.cal-day-hdr {
  text-align: center;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--gold-dk);
  padding: 6px 0;
  font-family: 'Cinzel', serif;
  text-transform: uppercase;
}
.cal-day-hdr:first-child { color: #c06060; }
.cal-day-hdr:last-child  { color: #6090c0; }

.cal-cell {
  background: rgba(200,169,90,0.03);
  border: 1px solid rgba(200,169,90,0.12);
  border-radius: 4px;
  min-height: 90px;
  padding: 6px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.cal-cell:hover {
  background: rgba(200,169,90,0.1);
  border-color: var(--gold);
  box-shadow: 0 0 12px rgba(200,169,90,0.2);
}
.cal-cell.empty {
  background: rgba(0,0,0,0.2);
  border-color: rgba(200,169,90,0.05);
  cursor: default;
  pointer-events: none;
}
.cal-cell.today {
  border-color: var(--gold);
  background: rgba(200,169,90,0.08);
}
.cal-cell.today::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(200,169,90,0.12), transparent 70%);
}

.cell-date {
  font-size: 13px;
  font-weight: 700;
  color: var(--gold-lt);
  margin-bottom: 4px;
  line-height: 1;
}
.cal-cell.empty .cell-date { color: rgba(200,169,90,0.2); }
.cell-sun .cell-date { color: #c06060; }
.cell-sat .cell-date { color: #6090c0; }

.cell-events {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.mini-event {
  font-size: 9px;
  padding: 1px 4px;
  border-radius: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: rgba(255,255,255,0.9);
  font-weight: 500;
}
.more-count {
  font-size: 9px;
  color: var(--gold-dk);
  padding-left: 2px;
}

/* ── Day view ── */
#day-view { display: none; padding: 0; }

.day-header {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.back-btn {
  background: rgba(200,169,90,0.1);
  border: 1px solid var(--border);
  color: var(--gold);
  padding: 7px 16px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
  font-family: 'Cinzel', serif;
  white-space: nowrap;
}
.back-btn:hover {
  background: rgba(200,169,90,0.25);
}
.day-title {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  color: var(--gold-lt);
  letter-spacing: 2px;
}
.day-add-btn {
  margin-left: auto;
  background: linear-gradient(135deg, var(--gold-dk), var(--gold));
  border: none;
  color: var(--dark);
  padding: 8px 20px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Cinzel', serif;
  letter-spacing: 1px;
  transition: all 0.2s;
  white-space: nowrap;
}
.day-add-btn:hover {
  box-shadow: 0 0 16px rgba(200,169,90,0.5);
  transform: translateY(-1px);
}

#time-grid {
  overflow-y: auto;
  max-height: calc(100vh - 260px);
}

.time-row {
  display: flex;
  border-bottom: 1px solid rgba(200,169,90,0.08);
  min-height: 54px;
  position: relative;
  transition: background 0.15s;
}
.time-row:hover { background: rgba(200,169,90,0.03); }

.time-label {
  width: 68px;
  flex-shrink: 0;
  padding: 6px 10px 0;
  font-size: 12px;
  color: var(--gold-dk);
  font-family: 'Cinzel', serif;
  letter-spacing: 1px;
  border-right: 1px solid rgba(200,169,90,0.15);
  text-align: right;
}
.time-slot {
  flex: 1;
  padding: 4px 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-content: flex-start;
  cursor: pointer;
  min-height: 54px;
}
.time-slot:hover::after {
  content: '+ 일정 추가';
  font-size: 10px;
  color: rgba(200,169,90,0.4);
  letter-spacing: 1px;
}

.event-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px 3px 8px;
  border-radius: 20px;
  font-size: 12px;
  color: rgba(255,255,255,0.95);
  font-weight: 500;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.15);
  max-width: 100%;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  transition: all 0.15s;
  position: relative;
}
.event-chip:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(0,0,0,0.5);
}
.event-chip .chip-del {
  font-size: 14px;
  opacity: 0.5;
  line-height: 1;
  cursor: pointer;
  margin-left: 2px;
  transition: opacity 0.15s;
}
.event-chip:hover .chip-del { opacity: 1; }
.event-chip .chip-who {
  font-size: 10px;
  opacity: 0.7;
  background: rgba(0,0,0,0.25);
  padding: 0 5px;
  border-radius: 10px;
}

/* ── Modal ── */
#modal-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(1,10,19,0.8);
  backdrop-filter: blur(4px);
  align-items: center;
  justify-content: center;
}
#modal-overlay.show { display: flex; }

#modal {
  background: var(--dark2);
  border: 1px solid var(--gold);
  border-radius: 8px;
  padding: 28px 28px 24px;
  width: 90%;
  max-width: 440px;
  position: relative;
  box-shadow: 0 0 40px rgba(200,169,90,0.2), 0 20px 60px rgba(0,0,0,0.6);
}
#modal::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold-lt), transparent);
}

#modal h3 {
  font-family: 'Cinzel', serif;
  color: var(--gold-lt);
  font-size: 18px;
  margin-bottom: 20px;
  letter-spacing: 2px;
}

.form-row {
  margin-bottom: 16px;
}
.form-row label {
  display: block;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--gold-dk);
  text-transform: uppercase;
  margin-bottom: 6px;
  font-family: 'Cinzel', serif;
}
.form-row input, .form-row select, .form-row textarea {
  width: 100%;
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--border);
  color: #ddd;
  padding: 9px 12px;
  border-radius: 4px;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus {
  border-color: var(--gold);
  box-shadow: 0 0 8px rgba(200,169,90,0.2);
}
.form-row textarea { resize: vertical; min-height: 60px; }
.form-row select option { background: #0a1428; }

/* Time range row */
.time-range {
  display: flex; gap: 10px; align-items: center;
}
.time-range select { flex: 1; }
.time-range span { color: var(--gold-dk); font-size: 12px; }

/* User selector */
.user-selector {
  display: flex; gap: 8px;
}
.user-btn {
  flex: 1;
  padding: 8px 6px;
  border-radius: 4px;
  border: 2px solid transparent;
  cursor: pointer;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-align: center;
  transition: all 0.2s;
}
.user-btn.black-btn {
  background: rgba(26,26,46,0.8);
  border-color: #3a3a8e;
  color: #8888cc;
}
.user-btn.white-btn {
  background: rgba(200,200,220,0.15);
  border-color: #888;
  color: #ccc;
}
.user-btn.yellow-btn {
  background: rgba(200,160,0,0.2);
  border-color: #c09010;
  color: #f0c040;
}
.user-btn.active.black-btn  { border-color: #6666ff; box-shadow: 0 0 10px rgba(100,100,255,0.4); background: rgba(26,26,80,0.9); color: #aaaaff; }
.user-btn.active.white-btn  { border-color: #eee;    box-shadow: 0 0 10px rgba(220,220,255,0.3); background: rgba(200,200,220,0.3); color: #fff; }
.user-btn.active.yellow-btn { border-color: #f0c040; box-shadow: 0 0 10px rgba(240,192,64,0.5);  background: rgba(200,150,0,0.3);   color: #ffe060; }

.modal-actions {
  display: flex; gap: 10px; margin-top: 20px;
}
.btn-save {
  flex: 1;
  background: linear-gradient(135deg, var(--gold-dk), var(--gold));
  border: none; color: var(--dark);
  padding: 11px; border-radius: 4px;
  font-size: 14px; font-weight: 700;
  font-family: 'Cinzel', serif;
  cursor: pointer; letter-spacing: 1px;
  transition: all 0.2s;
}
.btn-save:hover { box-shadow: 0 0 16px rgba(200,169,90,0.5); }
.btn-cancel {
  background: rgba(200,169,90,0.08);
  border: 1px solid var(--border);
  color: var(--gold-dk);
  padding: 11px 20px; border-radius: 4px;
  font-size: 13px; cursor: pointer;
  font-family: 'Cinzel', serif;
  transition: all 0.2s;
}
.btn-cancel:hover { background: rgba(200,169,90,0.15); }

/* ── Stats bar ── */
#stats-bar {
  display: flex; gap: 12px; flex-wrap: wrap;
  justify-content: center;
  margin: 14px 0 0;
}
.stat-pill {
  background: rgba(200,169,90,0.06);
  border: 1px solid rgba(200,169,90,0.2);
  border-radius: 20px;
  padding: 5px 16px;
  font-size: 12px;
  color: var(--gold-dk);
  letter-spacing: 1px;
}
.stat-pill strong { color: var(--gold-lt); }

/* ── Decorative corners ── */
.corner-deco {
  position: absolute;
  width: 16px; height: 16px;
  border-color: var(--gold);
  border-style: solid;
  opacity: 0.6;
}
.corner-deco.tl { top: 4px; left: 4px; border-width: 2px 0 0 2px; }
.corner-deco.tr { top: 4px; right: 4px; border-width: 2px 2px 0 0; }
.corner-deco.bl { bottom: 4px; left: 4px; border-width: 0 0 2px 2px; }
.corner-deco.br { bottom: 4px; right: 4px; border-width: 0 2px 2px 0; }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: rgba(200,169,90,0.15);
  border: 1px solid var(--gold);
  color: var(--gold-lt);
  padding: 10px 24px;
  border-radius: 24px;
  font-size: 13px;
  letter-spacing: 1px;
  z-index: 300;
  transition: transform 0.3s ease;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--dark); }
::-webkit-scrollbar-thumb { background: var(--gold-dk); border-radius: 3px; }

/* ── Responsive ── */
@media (max-width: 600px) {
  .cal-cell { min-height: 60px; }
  .mini-event { display: none; }
  .day-title { font-size: 15px; }
}
</style>
</head>
<body>
<div id="bg"></div>

<div id="app">
  <header>
    <div class="header-rune">⟡ League of Legends ⟡</div>
    <h1>2026 JUNE SCHEDULER<small>유월의 소환사 협곡</small></h1>
  </header>

  <!-- Legend -->
  <div id="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#3a3aee;box-shadow:0 0 6px #3a3aee"></div>
      <span>⬛ 블랙 — 네이버 개발자</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#ccccdd;box-shadow:0 0 6px rgba(200,200,255,0.5)"></div>
      <span>⬜ 화이트 — 카카오 기획자</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#f0c040;box-shadow:0 0 6px rgba(240,192,64,0.6)"></div>
      <span>🟡 옐로우 — 대학 교수</span>
    </div>
  </div>

  <!-- Stats -->
  <div id="stats-bar">
    <div class="stat-pill">📅 전체 일정 <strong id="stat-total">0</strong>개</div>
    <div class="stat-pill">⬛ 블랙 <strong id="stat-black">0</strong>개</div>
    <div class="stat-pill">⬜ 화이트 <strong id="stat-white">0</strong>개</div>
    <div class="stat-pill">🟡 옐로우 <strong id="stat-yellow">0</strong>개</div>
  </div>

  <!-- Month view -->
  <div id="month-view" class="panel" style="margin-top:16px">
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>

    <div class="cal-nav">
      <button class="nav-btn" id="prev-btn">◀</button>
      <h2 id="cal-title"></h2>
      <button class="nav-btn" id="next-btn">▶</button>
    </div>

    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- Day view -->
  <div id="day-view" class="panel" style="margin-top:16px">
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>

    <div class="day-header">
      <button class="back-btn" id="back-btn">◀ 6월</button>
      <div class="day-title" id="day-title"></div>
      <button class="day-add-btn" id="quick-add-btn">+ 일정 추가</button>
    </div>
    <div id="time-grid"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>

    <h3 id="modal-title">⚔ 일정 추가</h3>

    <div class="form-row">
      <label>작성자</label>
      <div class="user-selector">
        <button class="user-btn black-btn active" data-user="black">⬛ 블랙</button>
        <button class="user-btn white-btn"  data-user="white">⬜ 화이트</button>
        <button class="user-btn yellow-btn" data-user="yellow">🟡 옐로우</button>
      </div>
    </div>

    <div class="form-row">
      <label>날짜</label>
      <input type="date" id="f-date" min="2026-06-01" max="2026-06-30"/>
    </div>

    <div class="form-row">
      <label>시간</label>
      <div class="time-range">
        <select id="f-start"></select>
        <span>→</span>
        <select id="f-end"></select>
      </div>
    </div>

    <div class="form-row">
      <label>일정 제목</label>
      <input type="text" id="f-title" placeholder="일정을 입력하세요" maxlength="60"/>
    </div>

    <div class="form-row">
      <label>메모 (선택)</label>
      <textarea id="f-memo" placeholder="추가 메모..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-save" id="save-btn">저장</button>
      <button class="btn-cancel" id="cancel-btn">취소</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  Data layer  (Black — 네이버 30년차 개발자 설계)
//  LocalStorage key: "lol_schedule_2026_06"
// ═══════════════════════════════════════════════════════
const STORE_KEY = 'lol_schedule_2026_06';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch { return []; }
}
function saveData(arr) {
  localStorage.setItem(STORE_KEY, JSON.stringify(arr));
}

let events = loadData();  // [{id, user, date, startH, endH, title, memo}]

function addEvent(ev) {
  ev.id = Date.now() + Math.random();
  events.push(ev);
  saveData(events);
}
function removeEvent(id) {
  events = events.filter(e => e.id !== id);
  saveData(events);
}
function eventsForDate(dateStr) {
  return events.filter(e => e.date === dateStr).sort((a,b) => a.startH - b.startH);
}

// ═══════════════════════════════════════════════════════
//  User/color config  (White — 카카오 기획자 UX 설계)
// ═══════════════════════════════════════════════════════
const USER_CONFIG = {
  black:  { label:'블랙',   emoji:'⬛', bg:'#1e1e60', border:'#4444cc', text:'#aaaaff' },
  white:  { label:'화이트', emoji:'⬜', bg:'#303048', border:'#aaaacc', text:'#ffffff' },
  yellow: { label:'옐로우', emoji:'🟡', bg:'#4a3a00', border:'#c8a000', text:'#ffe060' },
};

// ═══════════════════════════════════════════════════════
//  Calendar state  (Yellow — 교수 구조 설계)
// ═══════════════════════════════════════════════════════
const YEAR = 2026, MONTH = 5; // JS month index (0-based) for June
const DAY_NAMES = ['일','월','화','수','목','금','토'];
const MONTH_KO  = ['1월','2월','3월','4월','5월','6월',
                   '7월','8월','9월','10월','11월','12월'];

let currentView = 'month'; // 'month' | 'day'
let selectedDate = null;   // 'YYYY-MM-DD'

// Time options: 00:00 ~ 23:00
function buildTimeOptions(selectEl, defaultH) {
  selectEl.innerHTML = '';
  for (let h = 0; h < 24; h++) {
    const opt = document.createElement('option');
    opt.value = h;
    opt.textContent = String(h).padStart(2,'0') + ':00';
    if (h === defaultH) opt.selected = true;
    selectEl.appendChild(opt);
  }
}

// ═══════════════════════════════════════════════════════
//  Month view render
// ═══════════════════════════════════════════════════════
function renderMonth() {
  const title = document.getElementById('cal-title');
  title.textContent = `${YEAR}년 ${MONTH_KO[MONTH]}`;

  const grid  = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Header row
  DAY_NAMES.forEach((d,i) => {
    const el = document.createElement('div');
    el.className = 'cal-day-hdr';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(YEAR, MONTH, 1).getDay(); // 0=Sun
  const lastDate  = new Date(YEAR, MONTH + 1, 0).getDate(); // 30 for June
  const today     = new Date();

  // Empty cells before 1st
  for (let i = 0; i < firstDay; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell empty';
    const prev = new Date(YEAR, MONTH, -firstDay + i + 1);
    cell.innerHTML = `<div class="cell-date">${prev.getDate()}</div>`;
    grid.appendChild(cell);
  }

  // Date cells
  for (let d = 1; d <= lastDate; d++) {
    const dateStr = `${YEAR}-06-${String(d).padStart(2,'0')}`;
    const dow     = new Date(YEAR, MONTH, d).getDay();
    const isToday = today.getFullYear()===YEAR && today.getMonth()===MONTH && today.getDate()===d;

    const cell = document.createElement('div');
    let cls = 'cal-cell';
    if (dow === 0) cls += ' cell-sun';
    if (dow === 6) cls += ' cell-sat';
    if (isToday)  cls += ' today';
    cell.className = cls;
    cell.dataset.date = dateStr;

    // Date number
    const dateEl = document.createElement('div');
    dateEl.className = 'cell-date';
    dateEl.textContent = d;
    cell.appendChild(dateEl);

    // Mini events
    const dayEvs = eventsForDate(dateStr);
    const evContainer = document.createElement('div');
    evContainer.className = 'cell-events';

    const MAX_SHOW = 3;
    dayEvs.slice(0, MAX_SHOW).forEach(ev => {
      const cfg = USER_CONFIG[ev.user];
      const el  = document.createElement('div');
      el.className = 'mini-event';
      el.style.background = cfg.bg;
      el.style.borderLeft  = `3px solid ${cfg.border}`;
      el.textContent = `${String(ev.startH).padStart(2,'0')}:00 ${ev.title}`;
      evContainer.appendChild(el);
    });
    if (dayEvs.length > MAX_SHOW) {
      const more = document.createElement('div');
      more.className = 'more-count';
      more.textContent = `+${dayEvs.length - MAX_SHOW}개 더`;
      evContainer.appendChild(more);
    }

    cell.appendChild(evContainer);
    cell.addEventListener('click', () => openDayView(dateStr));
    grid.appendChild(cell);
  }

  updateStats();
}

// ═══════════════════════════════════════════════════════
//  Day view render
// ═══════════════════════════════════════════════════════
function openDayView(dateStr) {
  selectedDate = dateStr;
  const [y, m, d] = dateStr.split('-');
  const dow = new Date(+y, +m - 1, +d).getDay();
  const dowNames = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

  document.getElementById('day-title').textContent =
    `${+m}월 ${+d}일 (${dowNames[dow]})`;

  document.getElementById('month-view').style.display = 'none';
  document.getElementById('day-view').style.display   = 'block';

  renderDayGrid(dateStr);
}

function renderDayGrid(dateStr) {
  const grid = document.getElementById('time-grid');
  grid.innerHTML = '';
  const dayEvs = eventsForDate(dateStr);

  for (let h = 0; h < 24; h++) {
    const row  = document.createElement('div');
    row.className = 'time-row';

    // Time label
    const lbl = document.createElement('div');
    lbl.className = 'time-label';
    lbl.textContent = String(h).padStart(2,'0') + ':00';
    row.appendChild(lbl);

    // Slot
    const slot = document.createElement('div');
    slot.className = 'time-slot';

    // Events that START at this hour (may span multiple hours)
    dayEvs.filter(ev => ev.startH === h).forEach(ev => {
      slot.appendChild(buildChip(ev, dateStr));
    });

    slot.addEventListener('click', e => {
      if (e.target.closest('.event-chip')) return;
      openModal(dateStr, h);
    });

    row.appendChild(slot);
    grid.appendChild(row);
  }
}

function buildChip(ev, dateStr) {
  const cfg  = USER_CONFIG[ev.user];
  const chip = document.createElement('div');
  chip.className = 'event-chip';
  chip.style.background  = cfg.bg;
  chip.style.borderColor = cfg.border;
  chip.style.color       = cfg.text;

  const span = ev.endH - ev.startH;
  const spanTxt = span > 1 ? ` (${span}h)` : '';

  chip.innerHTML = `
    <span class="chip-who">${cfg.emoji} ${cfg.label}</span>
    <span>${ev.title}${spanTxt}</span>
    <span class="chip-del" title="삭제">×</span>
  `;

  chip.querySelector('.chip-del').addEventListener('click', e => {
    e.stopPropagation();
    if (confirm(`"${ev.title}" 일정을 삭제할까요?`)) {
      removeEvent(ev.id);
      renderDayGrid(dateStr);
      renderMonth(); // refresh mini events
      showToast('일정이 삭제됐습니다.');
    }
  });

  // Tooltip on hover
  if (ev.memo) {
    chip.title = ev.memo;
  }

  return chip;
}

// ═══════════════════════════════════════════════════════
//  Modal  (White — 카카오 기획자 UX 흐름)
// ═══════════════════════════════════════════════════════
let selectedUser = 'black';

function openModal(dateStr, startH = 9) {
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('modal-title').textContent = '⚔ 일정 추가';
  document.getElementById('f-date').value = dateStr || selectedDate || `${YEAR}-06-01`;
  buildTimeOptions(document.getElementById('f-start'), startH);
  buildTimeOptions(document.getElementById('f-end'),   Math.min(startH + 1, 23));
  document.getElementById('f-title').value = '';
  document.getElementById('f-memo').value  = '';
  setUser('black');
  setTimeout(() => document.getElementById('f-title').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function setUser(u) {
  selectedUser = u;
  document.querySelectorAll('.user-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.user === u);
  });
}

// ═══════════════════════════════════════════════════════
//  Stats  (Yellow — 교수 데이터 정합성)
// ═══════════════════════════════════════════════════════
function updateStats() {
  document.getElementById('stat-total').textContent  = events.length;
  document.getElementById('stat-black').textContent  = events.filter(e=>e.user==='black').length;
  document.getElementById('stat-white').textContent  = events.filter(e=>e.user==='white').length;
  document.getElementById('stat-yellow').textContent = events.filter(e=>e.user==='yellow').length;
}

// ═══════════════════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════════════
//  Event listeners
// ═══════════════════════════════════════════════════════
document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('day-view').style.display   = 'none';
  document.getElementById('month-view').style.display = 'block';
  renderMonth();
});

document.getElementById('quick-add-btn').addEventListener('click', () => {
  openModal(selectedDate, 9);
});

document.getElementById('prev-btn').addEventListener('click', () => showToast('6월만 표시됩니다.'));
document.getElementById('next-btn').addEventListener('click', () => showToast('6월만 표시됩니다.'));

// User selector
document.querySelectorAll('.user-btn').forEach(btn => {
  btn.addEventListener('click', () => setUser(btn.dataset.user));
});

// Save
document.getElementById('save-btn').addEventListener('click', () => {
  const dateVal  = document.getElementById('f-date').value;
  const startH   = parseInt(document.getElementById('f-start').value);
  const endH     = parseInt(document.getElementById('f-end').value);
  const titleVal = document.getElementById('f-title').value.trim();
  const memoVal  = document.getElementById('f-memo').value.trim();

  if (!dateVal) { showToast('날짜를 선택해주세요.'); return; }
  if (endH <= startH) { showToast('종료 시간은 시작 시간보다 늦어야 합니다.'); return; }
  if (!titleVal) { showToast('일정 제목을 입력해주세요.'); return; }

  addEvent({ user: selectedUser, date: dateVal, startH, endH, title: titleVal, memo: memoVal });
  closeModal();
  showToast(`✅ 일정이 저장됐습니다.`);

  if (selectedDate === dateVal) {
    renderDayGrid(dateVal);
  }
  renderMonth();
  updateStats();
});

// Cancel
document.getElementById('cancel-btn').addEventListener('click', closeModal);

// Click outside modal
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    if (document.getElementById('modal-overlay').classList.contains('show')) {
      document.getElementById('save-btn').click();
    }
  }
});

// ═══════════════════════════════════════════════════════
//  Boot  (Yellow — 교수 초기화 순서)
// ═══════════════════════════════════════════════════════
renderMonth();
</script>
</body>
</html>
